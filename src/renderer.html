<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jane1 Pet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="pet-shell">
      <img id="pet" class="pet" alt="Jane1 desktop pet" draggable="false" />
      <nav class="controls" aria-label="Pet actions">
        <button data-action="idle" title="Idle">I</button>
        <button data-action="waving" title="Wave">W</button>
        <button data-action="running" title="Working">R</button>
        <button data-action="jumping" title="Jump">J</button>
      </nav>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
