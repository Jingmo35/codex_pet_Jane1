name: Package Codex pet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package files
        run: |
          test -f pet/jane1/pet.json
          test -f pet/jane1/spritesheet.webp
          test -f preview/all-actions.png

      - name: Create zip package
        run: |
          cd pet
          zip -r ../jane1-codex-pet.zip jane1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jane1-codex-pet
          path: jane1-codex-pet.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jane1-codex-pet.zip
